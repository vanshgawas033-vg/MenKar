<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MenKart Store</title>
<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f4f4f4;
}

header {
  background: black;
  color: white;
  padding: 15px;
  text-align: center;
}

.container {
  display: flex;
  gap: 20px;
  padding: 20px;
}

.product {
  background: white;
  padding: 15px;
  border-radius: 10px;
  width: 200px;
  text-align: center;
}

button {
  padding: 8px;
  margin-top: 10px;
  cursor: pointer;
}

.cart {
  background: white;
  padding: 15px;
  width: 300px;
  border-radius: 10px;
  height: fit-content;
}

.cart-item {
  border-bottom: 1px solid #ddd;
  padding: 5px 0;
}

.total {
  font-weight: bold;
  margin-top: 10px;
}
</style>
</head>

<body>

<header>
  <h1>MenKart Store</h1>
</header>

<div class="container">

  <!-- PRODUCTS -->
  <div>
    <h2>Products</h2>

    <div class="product">
      <h3>Men T-Shirt</h3>
      <p>Price: ₹999</p>
      <button onclick="addToCart('Men T-Shirt', 999)">Add to Cart</button>
      <button onclick="buyNow('Men T-Shirt', 999)">Buy Now</button>
    </div>

    <div class="product">
      <h3>Jeans</h3>
      <p>Price: ₹1499</p>
      <button onclick="addToCart('Jeans', 1499)">Add to Cart</button>
      <button onclick="buyNow('Jeans', 1499)">Buy Now</button>
    </div>

    <div class="product">
      <h3>Shoes</h3>
      <p>Price: ₹1999</p>
      <button onclick="addToCart('Shoes', 1999)">Add to Cart</button>
      <button onclick="buyNow('Shoes', 1999)">Buy Now</button>
    </div>

  </div>

  <!-- CART -->
  <div class="cart">
    <h2>Cart</h2>
    <div id="cartItems"></div>
    <p class="total">Total: ₹<span id="total">0</span></p>

    <button onclick="checkout()">Checkout</button>
    <button onclick="clearCart()">Clear Cart</button>
  </div>

</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function saveCart() {
  localStorage.setItem("cart", JSON.stringify(cart));
  renderCart();
}

function addToCart(name, price) {
  cart.push({ name, price });
  saveCart();
  alert(name + " added to cart!");
}

function buyNow(name, price) {
  alert("Buying " + name + " for ₹" + price);
}

function renderCart() {
  let cartItems = document.getElementById("cartItems");
  let total = 0;

  cartItems.innerHTML = "";

  cart.forEach((item, index) => {
    total += item.price;

    cartItems.innerHTML += `
      <div class="cart-item">
        ${item.name} - ₹${item.price}
        <button onclick="removeItem(${index})">X</button>
      </div>
    `;
  });

  document.getElementById("total").innerText = total;
}

function removeItem(index) {
  cart.splice(index, 1);
  saveCart();
}

function clearCart() {
  cart = [];
  saveCart();
}

function checkout() {
  if(cart.length === 0){
    alert("Cart is empty!");
    return;
  }
  alert("Order placed successfully! Total ₹" + document.getElementById("total").innerText);
  cart = [];
  saveCart();
}

renderCart();
</script>

</body>
</html>
